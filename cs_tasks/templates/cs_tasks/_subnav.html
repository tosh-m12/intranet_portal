{# cs_tasks/_subnav.html #}
{% load i18n %}
<div class="subnav">
    <a href="{% url 'cs_tasks:index' %}"
       class="{% if active_tab == 'index' %}active{% endif %}">
        <svg class="ic"><use href="#ic-list"/></svg>{% trans "全課題一覧" %}
    </a>
    <a href="{% url 'cs_tasks:my' %}"
       class="{% if active_tab == 'my' %}active{% endif %}">
        <svg class="ic"><use href="#ic-user"/></svg>{% trans "自分の担当" %}
    </a>

    {% if request.user.is_superuser or request.user.is_staff %}
        <a href="{% url 'cs_tasks:mailing_list' %}"
           class="{% if active_tab == 'mailing_list' %}active{% endif %}">
            <svg class="ic"><use href="#ic-mail"/></svg>{% trans "メーリングリスト" %}
        </a>
        <a href="{% url 'cs_tasks:weekly_report' %}"
           class="{% if active_tab == 'weekly_report' %}active{% endif %}">
            <svg class="ic"><use href="#ic-chart"/></svg>{% trans "週報" %}
        </a>
    {% endif %}
</div>
