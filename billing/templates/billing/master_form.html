{% extends "billing/base.html" %}
{% load i18n %}
{% block title %}{% trans "取引先 新規登録" %} — {% trans "請求書管理" %}{% endblock %}
{% block content %}
<div class="billing-app">
<div class="detail-head">
  <h2 class="sec">{% trans "取引先マスタ 新規登録" %}</h2>
  <a class="back" href="{% url 'billing:master' %}">← {% trans "マスタ一覧へ" %}</a>
</div>

<form method="post" action="{% url 'billing:master_add' %}" class="card-form">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ next }}">
  <label>{% trans "グループ名" %} <span class="req">{% trans "必須" %}</span>
    <input type="text" name="group_name" value="{{ prefill_group }}" list="dl-groups" class="alnum-up"
           autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="{% trans '例: HAKUTO' %}" required autofocus>
  </label>
  <datalist id="dl-groups">{% for g in groups %}<option value="{{ g }}">{% endfor %}</datalist>
  <label>{% trans "会社名" %} <span class="req">{% trans "必須" %}</span>
    <input type="text" name="company_name" value="{{ prefill_company }}" autocomplete="off" placeholder="{% trans '正式社名(基準表記)' %}" required>
  </label>
  <label>{% trans "業務概要" %}
    <textarea name="business_summary" rows="3" autocomplete="off" placeholder="{% trans '取引・業務の概要(任意)' %}"></textarea>
  </label>
  <div class="form-actions">
    <button type="submit" class="btn primary">{% trans "登録" %}</button>
    <a class="btn ghost" href="{% url 'billing:master' %}">{% trans "キャンセル" %}</a>
  </div>
</form>
</div>
{% endblock %}
