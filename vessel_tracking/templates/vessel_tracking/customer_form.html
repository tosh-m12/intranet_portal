{% extends "vessel_tracking/base.html" %}
{% load i18n %}
{% block title %}{% trans "荷主 新規登録" %} — {% trans "本船動向管理" %}{% endblock %}
{% block content %}
<div class="vessel-app">
<div class="detail-head">
  <h2 class="sec">{% trans "荷主マスタ 新規登録" %}</h2>
  <a class="back" href="{% url 'vessel_tracking:customers' %}">← {% trans "マスタ一覧へ" %}</a>
</div>

<form method="post" action="{% url 'vessel_tracking:customer_add' %}" class="card-form">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ next }}">
  <label>{% trans "荷主コード" %} <span class="req">{% trans "必須" %}</span>
    <input type="text" name="code" value="{{ prefill_code }}" class="alnum-up" maxlength="16"
           autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="{% trans '例: ASAHI' %}" required autofocus>
  </label>
  <label>{% trans "荷主名" %} <span class="req">{% trans "必須" %}</span>
    <input type="text" name="name" value="{{ prefill_name }}" autocomplete="off" placeholder="{% trans '正式社名(例: 朝日電器)' %}" required>
  </label>
  <div class="form-actions">
    <button type="submit" class="btn primary">{% trans "登録" %}</button>
    <a class="btn ghost" href="{% url 'vessel_tracking:customers' %}">{% trans "キャンセル" %}</a>
  </div>
</form>
</div>
{% endblock %}
