{% extends "portal/base.html" %}
{% load i18n %}

{% block title %}{% trans "パスワード変更" %}{% endblock %}

{% block app_name %}
<h1><svg class="ic"><use href="#ic-lock"/></svg> {% trans "パスワード変更" %}</h1>
{% endblock %}

{% block content %}
<p>{% trans "セキュリティのため、パスワードを変更してください。" %}</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% trans "変更する" %}</button>
</form>
{% endblock %}
