{% extends "portal/base.html" %}

{% block title %}パスワード変更{% endblock %}

{% block app_name %}
<h1>🔑 パスワード変更</h1>
{% endblock %}

{% block content %}
<p>セキュリティのため、パスワードを変更してください。</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">変更する</button>
</form>
{% endblock %}
