{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}
<h2>ログイン</h2>

{% if form.errors %}
    <p style="color:red;">メールアドレスまたはパスワードが正しくありません</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <div>
        {{ form.username.label_tag }}<br>
        {{ form.username }}
    </div>
    <div>
        {{ form.password.label_tag }}<br>
        {{ form.password }}
    </div>
    <button type="submit">ログイン</button>
</form>

<p>
  <a href="{% url 'authsys:reset_password' %}">パスワードを忘れた場合はこちら</a>
</p>

{% endblock %}
